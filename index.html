<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Max 155 characters -->
    <meta name="description" content="A simple shopping list application" />
    <meta name="keywords" content="HTML, shopping list, example" />
    <meta name="author" content="Abel Beltran" />
    <meta name="robots" content="index, follow" />
    <title>My Shopping List</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main>
      <h1>My Shopping List</h1>
      <section>
        <ul>
          <li>Fruits</li>
          <ol>
            <li>Apple 🍎</li>
            <li>Banana 🍌</li>
            <li>Orange 🍊</li>
          </ol>
        </ul>

        <ul>
          <li>Meat</li>
          <ol>
            <li>Chicken 🍗</li>
            <li>Beef 🍖</li>
            <li>Pork 🐽</li>
          </ol>
        </ul>

        <ul>
          <li>Vegetables</li>
          <ol>
            <li>Carrot 🥕</li>
            <li>Broccoli 🥦</li>
            <!-- noopener noreferrer helps to improve security by preventing the new page from accessing the original page -->
            <li><a href="#" target="_blank" rel="noopener noreferrer">Spinach 🍃</a></li>
          </ol>
        </ul>
      </section>
    </main>
    <footer>
      <p>Developed with love 💚 Abel Beltran &copy; 2025</p>
    </footer>
  </body>
</html>

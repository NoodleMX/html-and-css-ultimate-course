<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Max 155 characters -->
    <meta name="description" content="A simple HTML template" />
    <meta name="keywords" content="HTML, template, example" />
    <meta name="author" content="Abel Beltran" />
    <meta name="robots" content="index, follow" />
    <title>My Simple HTML Template</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <nav></nav>
    </header>
    <main>
      <h1>I'm the main heading</h1>
      <section>
        <h2>I'm a subheading</h2>
        <article>
          <h3>I'm a sub-subheading</h3>
          <p>I'm a paragraph with <strong>bold</strong> text.</p>
          <a href="#">I'm a link</a>
        </article>
        <ul>
          <li>This is an unordered list item.</li>
        </ul>
        <ol>
          <li>This is an ordered list item.</li>
          <li>This is another ordered list item.</li>
        </ol>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
